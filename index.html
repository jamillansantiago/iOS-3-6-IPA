<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="App Store">
    
    <link rel="apple-touch-icon" href="https://archive.org/download/ios3-6-ipas/icons/im_lite.png">

    <title>App Store - Genius</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #c5ccd4;
            color: #000;
            -webkit-user-select: none;
            -webkit-text-size-adjust: none;
        }

        /* Barra superior con el azul metálico de iOS 6 */
        .navbar {
            background: -webkit-gradient(linear, left top, left bottom, from(#768ca7), to(#3e5675));
            border-bottom: 1px solid #2d3e54;
            height: 44px;
            display: -webkit-box;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .segmented-control {
            display: -webkit-box;
            border: 1px solid #2a3a4e;
            border-radius: 5px;
            overflow: hidden;
            background: -webkit-gradient(linear, left top, left bottom, from(#536a87), to(#405774));
        }

        .segment {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.6);
            border-right: 1px solid #2a3a4e;
            text-decoration: none;
            background: -webkit-gradient(linear, left top, left bottom, from(#637d9d), to(#4c6687));
        }

        .segment:last-child {
            border-right: none;
        }

        .segment.active {
            background: -webkit-gradient(linear, left top, left bottom, from(#39506e), to(#536d93));
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        /* Lista con diseño skeuomórfico clásico */
        .app-list {
            background-color: #929ba6;
            list-style: none;
            margin: 44px 0 0 0;
            padding: 0;
        }

        .app-item {
            display: -webkit-box;
            -webkit-box-align: center;
            padding: 10px;
            border-bottom: 1px solid #717d8a;
            border-top: 1px solid #b1b9c2;
            background: -webkit-gradient(linear, left top, left bottom, from(#cbd2d9), to(#b3bcc5));
        }

        .app-icon {
            width: 57px;
            height: 57px;
            border-radius: 10px;
            margin-right: 12px;
            background-color: #fff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        .app-details {
            -webkit-box-flex: 1;
            display: block;
            overflow: hidden;
        }

        .app-based-on {
            display: block;
            font-size: 11px;
            color: #4c566c;
            margin-bottom: 2px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .app-title {
            display: block;
            font-size: 15px;
            font-weight: bold;
            color: #000;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
            margin-bottom: 2px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .app-rating {
            display: block;
            font-size: 11px;
            color: #4c566c;
        }

        .stars {
            color: #ff9500;
            margin-right: 4px;
        }

        /* Botón "FREE" con relieve de iOS 6 */
        .btn-get {
            background: -webkit-gradient(linear, left top, left bottom, from(#fcfcfc), to(#cbd0d4));
            border: 1px solid #707070;
            border-radius: 4px;
            color: #1956a7;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 12px;
            min-width: 45px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 1px 0 rgba(255,255,255,0.6);
        }

        .arrow-right {
            width: 8px;
            height: 13px;
            margin-left: 10px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 13"><path d="M1.5 1.5 l5 5 -5 5" stroke="%23717d8a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>') no-repeat;
            background-size: contain;
        }

        /* Tab Bar inferior en negro brillante (iPod touch style) */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 49px;
            background: -webkit-gradient(linear, left top, left bottom, from(#2c2c2c), to(#000000));
            border-top: 1px solid #000;
            display: -webkit-box;
            -webkit-box-justify: space-around;
            -webkit-box-align: center;
            z-index: 10;
        }

        .tab-item {
            -webkit-box-flex: 1;
            text-align: center;
            display: block;
            color: #999;
            font-size: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .tab-item.active {
            color: #0088ff;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            margin: 2px auto;
            background-color: #555;
            border-radius: 4px;
        }

        .tab-item.active .tab-icon {
            background-color: #0088ff;
        }

        .spacer {
            height: 60px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="segmented-control">
            <a href="#" class="segment">Destacados</a>
            <a href="#" class="segment">Éxitos</a>
            <a href="#" class="segment active">Genius</a>
        </div>
    </div>

    <ul class="app-list" id="appContainer">
        <li class="app-item" style="display:-webkit-box; -webkit-box-pack:center; color:#4c566c;">Cargando repositorio antiguo...</li>
    </ul>

    <div class="spacer"></div>

    <div class="tab-bar">
        <a href="#" class="tab-item active"><div class="tab-icon"></div>Destacados</a>
        <a href="#" class="tab-item"><div class="tab-icon"></div>Categorías</a>
        <a href="#" class="tab-item"><div class="tab-icon"></div>Top 25</a>
        <a href="#" class="tab-item"><div class="tab-icon"></div>Buscar</a>
        <a href="#" class="tab-item"><div class="tab-icon"></div>Actualizaciones</a>
    </div>

    <script>
        // JS compatible con iOS 6 (Sin let, const, arrow functions o promesas nativas complejas)
        var repoUrl = "https://archive.org/download/ios3-6-ipas/";
        var proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(repoUrl);

        function cargarIpas() {
            var container = document.getElementById('appContainer');
            var xhr = new XMLHttpRequest();
            
            xhr.open("GET", proxyUrl, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            var htmlContent = response.contents;
                            
                            // Regex compatible con el motor antiguo para capturar enlaces de archivos .ipa
                            var regex = /href="([^"]+\.ipa)"/g;
                            var match;
                            var ipaFiles = [];
                            
                            while ((match = regex.exec(htmlContent)) !== null) {
                                var rawName = match[1];
                                var cleanTitle = rawName.replace('.ipa', '').replace(/_/g, ' ').replace(/-/g, ' ');
                                ipaFiles.push({ fileName: rawName, title: cleanTitle });
                            }

                            if (ipaFiles.length === 0) {
                                container.innerHTML = '<li class="app-item" style="display:-webkit-box; -webkit-box-pack:center;">No se encontraron .ipa</li>';
                                return;
                            }

                            container.innerHTML = ""; // Limpiar el "Cargando..."

                            for (var i = 0; i < ipasMockData.length; i++) {
                                var app = ipasMockData[i];
                                var li = document.createElement('li');
                                li.className = 'app-item';
                                
                                // Inyección directa compatible con renderizado WebKit de iOS 6
                                li.innerHTML = '<img class="app-icon" src="' + app.icon + '" onerror="this.src=\'data:image/svg+xml;utf8,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' width=\\\'57\\\' height=\\\'57\\\'><rect width=\\\'57\\\' height=\\\'57\\\' rx=\\\'10\\\' fill=\\\'%231f7cd3\\\'/></svg>\';" />' +
                                    '<div class="app-details">' +
                                        '<span class="app-based-on">' + app.basedOn + '</span>' +
                                        '<span class="app-title">' + app.title + '</span>' +
                                        '<span class="app-rating"><span class="stars">' + app.rating + '</span>' + app.ratingsCount + '</span>' +
                                    '</div>' +
                                    '<a href="#" class="btn-get" onclick="instalarAppOta(event, \'' + app.plistName + '\', \'' + app.title + '\')">' + app.price + '</a>' +
                                    '<div class="arrow-right"></div>';
                                container.appendChild(li);
                            }

                        } catch (e) {
                            container.innerHTML = '<li class="app-item" style="color:red;">Error al procesar datos</li>';
                        }
                    } else {
                        container.innerHTML = '<li class="app-item" style="color:red;">Error de conexión servidor</li>';
                    }
                }
            };
            xhr.send();
        }

        // Datos enriquecidos estructurados para calzar exactamente con el look de la imagen
        var ipasMockData = [
            { title: "IM+ Lite", basedOn: "Based on Skype", rating: "★★★☆☆", ratingsCount: "786 Ratings", price: "FREE", icon: "https://archive.org/download/ios3-6-ipas/icons/im_lite.png", plistName: "im_lite.plist" },
            { title: "BeatMaker", basedOn: "Based on I Am T-Pain", rating: "★★★★★", ratingsCount: "15 Ratings", price: "$19.99", icon: "https://archive.org/download/ios3-6-ipas/icons/beatmaker.png", plistName: "beatmaker.plist" },
            { title: "twitterena", basedOn: "Based on Tweetie", rating: "☆☆☆☆☆", ratingsCount: "No Ratings", price: "$0.99", icon: "https://archive.org/download/ios3-6-ipas/icons/twitterena.png", plistName: "twitterena.plist" },
            { title: "UNO™", basedOn: "Based on Bejeweled® 2", rating: "★★★★★", ratingsCount: "6 Ratings", price: "$4.99", icon: "https://archive.org/download/ios3-6-ipas/icons/uno.png", plistName: "uno.plist" },
            { title: "JustUpdate", basedOn: "Based on Twitterrific Premium", rating: "★★★☆☆", ratingsCount: "5 Ratings", price: "FREE", icon: "https://archive.org/download/ios3-6-ipas/icons/justupdate.png", plistName: "justupdate.plist" }
        ];

        function instalarAppOta(event, plistName, appName) {
            event.preventDefault();
            var confirmar = confirm("¿Deseas conectar con archive.org para instalar " + appName + "?");
            if (confirmar) {
                // Generamos la llamada nativa itms-services exacta
                var basePlistUrl = "https://archive.org/download/ios3-6-ipas/manifests/" + plistName;
                window.location.href = "itms-services://?action=download-manifest&url=" + encodeURIComponent(basePlistUrl);
            }
        }

        window.onload = cargarIpas;
    </script>
</body>
</html>
